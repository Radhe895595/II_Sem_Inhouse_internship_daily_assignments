<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-card">
    <h1>Registration Form</h1>

    <form action="#" method="post">

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter full name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter email address" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
        </div>
        <div class="form-group">
          <label for="dob">Birth Date</label>
          <input type="date" id="dob" name="dob">
        </div>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="radio-row">
          <label class="radio-label"><input type="radio" name="gender" value="male" checked> Male</label>
          <label class="radio-label"><input type="radio" name="gender" value="female"> Female</label>
          <label class="radio-label"><input type="radio" name="gender" value="na"> Prefer not to say</label>
        </div>
      </div>

      <div class="form-group">
        <label for="address1">Address</label>
        <input type="text" id="address1" name="address1" placeholder="Enter street address">
      </div>

      <div class="form-group">
        <input type="text" id="address2" name="address2" placeholder="Enter street address line 2">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" name="country">
            <option value="">Select country</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Enter your city">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="region">Region</label>
          <input type="text" id="region" name="region" placeholder="Enter your region">
        </div>
        <div class="form-group">
          <label for="postal">Postal Code</label>
          <input type="text" id="postal" name="postal" placeholder="Enter postal code">
        </div>
      </div>

      <button type="submit">Submit</button>

    </form>
  </div>

</body>
</html>
